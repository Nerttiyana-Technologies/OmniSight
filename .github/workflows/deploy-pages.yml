name: Deploy demo to GitHub Pages

# Builds the static, read-only OmniSight demo (no backend) and publishes it to
# GitHub Pages. Enable once under: repo Settings → Pages → Build and deployment
# → Source: "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Node must be 22 BEFORE pnpm runs — pnpm 11.9 requires Node >= 22.13.
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0

      - run: pnpm install --no-frozen-lockfile

      - name: Build static demo
        run: pnpm --filter @omnisight/web build
        env:
          VITE_DEMO: "true"
          # Serve under the project path, e.g. /OmniSight/. Auto-derived from the repo name.
          VITE_BASE: "/${{ github.event.repository.name }}/"

      - name: Disable Jekyll processing
        run: touch apps/web/dist/.nojekyll

      # Pages must be enabled once manually: Settings → Pages → Source: "GitHub Actions".
      # (The default token usually can't create the Pages site programmatically.)
      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
